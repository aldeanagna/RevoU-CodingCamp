<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>List Examples</title>
    <!-- Tailwind CSS v4 via CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style type="text/tailwindcss">
        @theme {
            --color-glass-bg: rgba(255, 255, 255, 0.15);
            --color-glass-border: rgba(255, 255, 255, 0.3);
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 1.25rem;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        }

        .list-item-glass {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 0.625rem;
            transition: background 0.2s ease, transform 0.2s ease;
        }

        .list-item-glass:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: translateX(6px);
        }
    </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-indigo-600 via-purple-600 to-pink-500 flex items-center justify-center p-8">

    <!-- Decorative blobs -->
    <div class="fixed top-[-80px] left-[-80px] w-80 h-80 bg-purple-400 rounded-full opacity-30 blur-3xl pointer-events-none"></div>
    <div class="fixed bottom-[-80px] right-[-80px] w-96 h-96 bg-pink-400 rounded-full opacity-30 blur-3xl pointer-events-none"></div>

    <div class="w-full max-w-2xl flex flex-col gap-8">

        <!-- Page title -->
        <div class="text-center">
            <h1 class="text-4xl font-bold text-white drop-shadow-lg tracking-tight">HTML Lists</h1>
            <p class="text-white/70 mt-2 text-sm">Contoh penggunaan Unordered & Ordered List</p>
        </div>

        <!-- Unordered List Card -->
        <div class="glass-card p-8">
            <div class="flex items-center gap-3 mb-6">
                <span class="text-2xl">🍎</span>
                <div>
                    <h2 class="text-2xl font-semibold text-white">Unordered List</h2>
                    <p class="text-white/60 text-sm">Daftar Buah</p>
                </div>
            </div>

            <ul class="flex flex-col gap-3">
                <!-- square marker -->
                <li class="list-item-glass flex items-center gap-4 px-5 py-3 text-white font-medium">
                    <span class="inline-block w-3 h-3 rounded-sm bg-gradient-to-br from-yellow-300 to-orange-400 shadow-sm flex-shrink-0"></span>
                    Mangga
                    <span class="ml-auto text-xs text-white/40 italic">square</span>
                </li>
                <!-- no marker -->
                <li class="list-item-glass flex items-center gap-4 px-5 py-3 text-white font-medium">
                    <span class="inline-block w-3 h-3 flex-shrink-0"></span>
                    Pisang
                    <span class="ml-auto text-xs text-white/40 italic">none</span>
                </li>
                <!-- disc marker -->
                <li class="list-item-glass flex items-center gap-4 px-5 py-3 text-white font-medium">
                    <span class="inline-block w-3 h-3 rounded-full bg-gradient-to-br from-green-300 to-emerald-500 shadow-sm flex-shrink-0"></span>
                    Jambu
                    <span class="ml-auto text-xs text-white/40 italic">disc</span>
                </li>
            </ul>
        </div>

        <!-- Ordered List Card -->
        <div class="glass-card p-8">
            <div class="flex items-center gap-3 mb-6">
                <span class="text-2xl">🏆</span>
                <div>
                    <h2 class="text-2xl font-semibold text-white">Ordered List</h2>
                    <p class="text-white/60 text-sm">Urutan Ranking Kelas</p>
                </div>
            </div>

            <ol class="flex flex-col gap-3">
                <li class="list-item-glass flex items-center gap-4 px-5 py-3 text-white font-medium">
                    <span class="inline-flex items-center justify-center w-8 h-8 rounded-full bg-gradient-to-br from-yellow-300 to-yellow-500 text-yellow-900 text-sm font-bold flex-shrink-0 shadow">1</span>
                    Siswa A
                    <span class="ml-auto text-yellow-300 text-sm">🥇</span>
                </li>
                <li class="list-item-glass flex items-center gap-4 px-5 py-3 text-white font-medium">
                    <span class="inline-flex items-center justify-center w-8 h-8 rounded-full bg-gradient-to-br from-slate-300 to-slate-400 text-slate-800 text-sm font-bold flex-shrink-0 shadow">2</span>
                    Siswa B
                    <span class="ml-auto text-slate-300 text-sm">🥈</span>
                </li>
                <li class="list-item-glass flex items-center gap-4 px-5 py-3 text-white font-medium">
                    <span class="inline-flex items-center justify-center w-8 h-8 rounded-full bg-gradient-to-br from-orange-300 to-amber-500 text-orange-900 text-sm font-bold flex-shrink-0 shadow">3</span>
                    Siswa C
                    <span class="ml-auto text-amber-300 text-sm">🥉</span>
                </li>
                <li class="list-item-glass flex items-center gap-4 px-5 py-3 text-white font-medium">
                    <span class="inline-flex items-center justify-center w-8 h-8 rounded-full bg-gradient-to-br from-purple-300 to-indigo-400 text-indigo-900 text-sm font-bold flex-shrink-0 shadow">4</span>
                    Siswa D
                </li>
            </ol>
        </div>

        <p class="text-center text-white/40 text-xs">RevoU Coding Camp · HTML &amp; CSS</p>
    </div>

</body>
</html>
